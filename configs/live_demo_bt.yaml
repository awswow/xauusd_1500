# ─────────────────────────────────────────────────────────────────────────────
# Forward test pass/fail criteria (XAU_M15_PBT_v1.0)
# Defined before live trading begins.  Evaluate at 150 trades minimum.
#
# Staging:
#   Stage 1 — Demo:       150 trades at $15/trade
#   Stage 2 — Small live: 50-100 trades at $7.50/trade
#   Stage 3 — Full size:  $15/trade
#   Stage 4 — Scale:      $30/trade  (only at new equity high)
# ─────────────────────────────────────────────────────────────────────────────
forward_test:
  version: "XAU_M15_PBT_v1.0"
  frozen_date: "2026-07-07"
  min_trades_to_evaluate: 150

  continue_if:
    expectancy_r_min: 0.00        # mean R/trade >= 0
    avg_r_min: 0.05               # mean R/trade >= +0.05
    max_drawdown_r: 20.0          # max DD < 20R
    execution_slippage_max_r: 0.10  # slippage cost < 0.10R/trade

  investigate_if:
    expectancy_range_r: [-0.05, 0.05]   # edge unclear, gather more data
    win_rate_min: 0.28                   # below breakeven at 2.5R target

  stop_if:
    expectancy_r_min: -0.10       # mean R/trade < -0.10R after 150 trades
    repeated_execution_failures: true

  expected_oos_distribution:
    win_rate: 0.325               # from nested WF aggregated OOS
    mean_r_per_trade: 0.1375
    p_positive_expectancy: 0.993  # bootstrap, 10k resamples
    mc_p5_at_200_trades: -11.0    # 5th pct final equity at 200 trades
    mc_median_at_200_trades: 27.5
    mc_p95_at_200_trades: 66.0
    p_end_negative_200_trades: 0.125
    p_dd_gt_20r_200_trades: 0.317
